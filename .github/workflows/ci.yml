name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Smoke test matching benchmark
        run: |
          python scripts/benchmark_matching.py \
            --mode quick \
            --warmups 0 \
            --repeats 1 \
            --output matching-benchmark-smoke.json

      - name: Upload matching benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: matching-benchmark-python-${{ matrix.python-version }}
          path: matching-benchmark-smoke.json

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Set up venv
        run: uv venv

      - name: Bootstrap development dependencies
        run: uv pip install --group dev

      - name: Install other dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest -n auto

      - name: Run Ruff
        run: uv run ruff check src tests

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Set up Python
        run: uv python install 3.10

      - name: Set up venv
        run: uv venv

      - name: Bootstrap development dependencies
        run: uv pip install --group dev

      - name: Install other dependencies
        run: uv sync --all-groups

      - name: Build wheel
        run: uv build

      - name: Verify wheel installs
        run: |
          uv venv /tmp/test-install
          uv pip install --python /tmp/test-install/bin/python dist/*.whl
          /tmp/test-install/bin/git-stage-batch --help

  sha256-repository:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Set up Python
        run: uv python install 3.10

      - name: Set up venv
        run: uv venv

      - name: Bootstrap development dependencies
        run: uv pip install --group dev

      - name: Install other dependencies
        run: uv sync --all-groups

      - name: Report Git object-format support
        run: |
          git --version
          probe=$(mktemp -d)
          if git init --object-format=sha256 "$probe"; then
            git -C "$probe" rev-parse --show-object-format
          else
            echo "Installed Git does not support SHA-256 repositories"
          fi

      - name: Run SHA-256 repository workflows
        run: uv run pytest -n auto tests/functional/test_sha256_repository.py
